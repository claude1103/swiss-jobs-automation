name: Scheduled Gemstone Scraper

# This workflow runs automatically every day, and can also be triggered manually
on:
  schedule:
    # Runs every day at 08:30 UTC (10:30 AM in Switzerland during daylight savings, 09:30 AM in winter)
    - cron: '30 8 * * *'
  workflow_dispatch: # Allows you to click "Run workflow" manually in the GitHub website dashboard

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Copy your code from the GitHub repository onto the runner server
    - name: Check out repository
      uses: actions/checkout@v4

    # Step 2: Set up Python on the runner server
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Step 3: Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # Step 4: Run your script, injecting the secret SerpApi key safely from GitHub Secrets
    - name: Run gemstone finder script
      env:
        SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
      run: python gem_finder.py

    # Step 5: Send the gemstone report via email
    - name: Send email report
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.MAIL_USERNAME }} # Your Gmail address
        password: ${{ secrets.MAIL_PASSWORD }} # Your Gmail App Password
        subject: "💎 Daily Gemstone Market Intelligence Report"
        to: claude110375@gmail.com
        from: "Gemstone Intelligence Agent"
        html_body: file://gem_report.html

    # Step 6: Save the updated files back into your repository
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add gem_report.html gem_listings.json
        git diff-index --quiet HEAD || git commit -m "Auto-update: daily gemstone report"
        git push
