name: Scheduled Job Scraper

# This workflow runs automatically every day, and can also be triggered manually
on:
  schedule:
    # Runs every Monday at 08:00 UTC (10:00 AM in Switzerland during daylight savings, 09:00 AM in winter)
    - cron: '0 8 * * 1'
  workflow_dispatch: # Allows you to click "Run workflow" manually in the GitHub website dashboard

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Copy your code from the GitHub repository onto the runner server
    - name: Check out repository
      uses: actions/checkout@v4

    # Step 2: Set up Python on the runner server
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Step 3: Install the libraries listed in requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4: Run your script, injecting the secret keys safely from GitHub Secrets
    - name: Run job finder script
      env:
        ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
        ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
      run: python job_finder.py

    # Step 5: Send the job report via email
    - name: Send email report
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.MAIL_USERNAME }} # Your Gmail address
        password: ${{ secrets.MAIL_PASSWORD }} # Your Gmail App Password
        subject: "🇨🇭 Weekly Swiss Regulatory & AI Jobs Report"
        to: ${{ secrets.MAIL_TO }}             # The email address you want to send it to
        from: "Swiss Jobs Scraper"
        html_body: file://jobs_report.md
        convert_markdown: true

    # Step 6: Save the updated jobs_report.md file back into your repository
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add jobs_report.md
        git diff-index --quiet HEAD || git commit -m "Auto-update: daily jobs report"
        git push
