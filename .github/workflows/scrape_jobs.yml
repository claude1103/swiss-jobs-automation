name: Scheduled Job Scraper

# This workflow runs automatically every day, and can also be triggered manually
on:
  schedule:
    # Runs every Monday at 08:00 UTC (10:00 AM in Switzerland during daylight savings, 09:00 AM in winter)
    - cron: '0 8 * * 1'
  workflow_dispatch: # Allows you to click "Run workflow" manually in the GitHub website dashboard

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Copy your code from the GitHub repository onto the runner server
    - name: Check out repository
      uses: actions/checkout@v4

    # Step 2: Set up Python on the runner server
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Step 3: Install the libraries listed in requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4: Run your script, injecting the secret keys safely from GitHub Secrets
    - name: Run job finder script
      env:
        ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
        ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
      run: python job_finder.py

    # Step 5: Save the updated jobs_report.md file back into your repository
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add jobs_report.md
        # The 'git diff-index' check ensures we only commit if there are actual updates.
        # This prevents the action from throwing an error if there are no new jobs found.
        git diff-index --quiet HEAD || git commit -m "Auto-update: daily jobs report"
        git push
